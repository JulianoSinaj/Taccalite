# Taccalite — production stack for a single Hetzner VM.
#   docker compose up -d --build
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: /app/data/taccalite.db
    volumes:
      - ./data:/app/data          # SQLite DB + WAL live here (persisted)
    expose:
      - "3000"
    # No public port — Caddy is the only thing exposed to the internet.

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
