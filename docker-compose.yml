# Taccalite — production stack for a single Hetzner VM.
#   docker compose up -d --build
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: /app/data/taccalite.db
      # Caddy sits in front and overwrites X-Forwarded-For, so it's safe to trust.
      TRUST_PROXY: "true"
    volumes:
      - ./data:/app/data          # SQLite DB + WAL live here (persisted)
    expose:
      - "3000"
    # No public port — Caddy is the only thing exposed to the internet.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    # Resource ceilings so a runaway can't take the whole VM down.
    mem_limit: 512m
    cpus: 1.0

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy   # don't proxy until migrations + boot finish
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 128m
    cpus: 0.5

volumes:
  caddy_data:
  caddy_config:
